version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: "all"
    reviewers:
      - "PabloTerrazas16"
      - "JereMago"
    assignees:
      - "PabloTerrazas16"
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "chore"
      prefix-scope: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:30"
    open-pull-requests-limit: 3
    reviewers:
      - "PabloTerrazas16"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      prefix-scope: "actions"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 2
    reviewers:
      - "PabloTerrazas16"
    labels:
      - "dependencies"
      - "docker"
      # holaa
    commit-message:
      prefix: "build"
      prefix-scope: "docker"
      include: "scope"