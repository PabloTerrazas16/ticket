name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ["17"]

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: "temurin"
          cache: maven

      - name: 🔨 Build con Maven
        run: ./mvnw clean package -DskipTests

      - name: 🧪 Ejecutar tests
        run: ./mvnw test

      - name: 📊 Reportar resultados
        if: always()
        run: |
          echo "✅ Build completado"
          ./mvnw --version
          java -version

  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🔍 Verificar estilo de código
        run: |
          echo "Verificando convenciones de código..."
          ./mvnw clean compile

      - name: 📝 Validar estructura del proyecto
        run: |
          echo "✓ Verificando estructura de directorios"
          test -d "src/main/java" || exit 1
          test -d "src/test/java" || exit 1
          echo "✓ Estructura correcta"

  integration-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: 🧪 Ejecutar tests de integración
        run: ./mvnw verify

      - name: 📦 Construir JAR
        run: ./mvnw package -DskipTests

      - name: ✅ Verificar JAR creado
        run: |
          test -f "target/*.jar" && echo "✓ JAR generado exitosamente" || exit 1

  notify-results:
    runs-on: ubuntu-latest
    needs: [build, quality-checks]
    if: always()

    steps:
      - name: 📢 Notificar resultado del build
        run: |
          if [ "${{ needs.build.result }}" == "success" ] && [ "${{ needs.quality-checks.result }}" == "success" ]; then
            echo "✅ TODOS LOS CHECKS PASARON"
            echo "Pipeline ejecutado por: ${{ github.actor }}"
            echo "Rama: ${{ github.ref }}"
          else
            echo "❌ ALGUNOS CHECKS FALLARON"
            exit 1
          fi
