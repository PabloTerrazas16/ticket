name: CI/CD Pipeline - DOY0101

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: ticket-service
  REGISTRY: ghcr.io
  JAVA_VERSION: "17"

jobs:
  test:
    name: "Pruebas Unitarias (JUnit) y SonarCloud"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Ejecutar pruebas con Maven y Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B verify sonar:sonar \
            -Dsonar.projectKey=PabloTerrazas16_ticket \
            -Dsonar.organization=pabloterrazas16 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true \
            -Dspring.profiles.active=test

      - name: Publicar resultados de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

      - name: "Publicar reporte de cobertura (JaCoCo)"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

  security:
    name: "Análisis de Seguridad (Snyk)"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Compilar proyecto antes de escanear
        run: ./mvnw package -DskipTests

      - name: Instalar Snyk CLI
        run: npm install -g snyk

      - name: Escaneo de dependencias con Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high --all-projects --json-file-output=snyk.json

      - name: Monitorear proyecto en Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --all-projects

      - name: Publicar reporte Snyk
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: snyk.json

  build:
    name: "Build imagen Docker"
    runs-on: ubuntu-latest
    needs: security
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Empaquetar aplicación
        run: ./mvnw package -DskipTests

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login al registro (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Escaneo de imagen con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          scan-type: "image"
          ignore-unfixed: true

      - name: Publicar resultados Trivy en GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: success()
        with:
          sarif_file: "trivy-results.sarif"

  deploy:
    name: "Deploy en entorno simulado"
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Deploy con Docker Compose (staging simulado)
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 15
          docker compose ps

      - name: Verificar trazabilidad del despliegue
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Trazabilidad del despliegue"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Commit SHA   : ${{ github.sha }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Autor        : ${{ github.actor }}"
          echo "Timestamp    : $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Workflow Run : ${{ github.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Cleanup entorno simulado
        if: always()
        run: docker compose down
